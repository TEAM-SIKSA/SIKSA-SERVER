name: CI

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-convention:
    name: Validate PR Convention
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          BRANCH_REGEX='^(feat|docs|chore|init|hotfix)/#[0-9]+/[a-z0-9-]+$|^release/[0-9]+\.[0-9]+\.[0-9]+$'

          echo "Branch name: ${BRANCH_NAME}"

          if [[ ! "${BRANCH_NAME}" =~ ${BRANCH_REGEX} ]]; then
            echo "❌ 브랜치명이 팀 컨벤션에 맞지 않습니다."
            echo "허용 예시:"
            echo "- feat/#12/kakao-login"
            echo "- chore/#4/cicd-dev-deploy"
            echo "- docs/#8/api-docs"
            echo "- init/#1/project-structure"
            echo "- hotfix/#56/payment-timeout"
            echo "- release/1.0.0"
            exit 1
          fi

          echo "✅ 브랜치명 컨벤션 통과"

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          TITLE_REGEX='^\[(Feat|Fix|Docs|Refactor|Perf|Test|Build|CI|CD|Chore|Init|Release|Hotfix|Revert)\] .+ \(#[0-9]+\)$'

          echo "PR title: ${PR_TITLE}"

          if [[ ! "${PR_TITLE}" =~ ${TITLE_REGEX} ]]; then
            echo "❌ PR 제목이 팀 컨벤션에 맞지 않습니다."
            echo "형식:"
            echo "- [Type] 작업 내용 (#이슈번호)"
            echo "예시:"
            echo "- [CI] PR 빌드 검증 워크플로우 추가 (#4)"
            echo "- [CD] 개발 서버 자동 배포 파이프라인 추가 (#4)"
            echo "- [Feat] 카카오 로그인 추가 (#12)"
            echo "- [Fix] 예약 상태 변경 오류 수정 (#15)"
            exit 1
          fi

          echo "✅ PR 제목 컨벤션 통과"

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: validate-convention

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon
